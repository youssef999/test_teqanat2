# Nginx configuration for optimized Flutter web app performance
# Place this in your nginx sites-available directory

server {
    listen 80;
    listen [::]:80;
    server_name teqanat.com www.teqanat.com;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name teqanat.com www.teqanat.com;
    
    # SSL Configuration (update paths to your certificates)
    # ssl_certificate /path/to/your/certificate.crt;
    # ssl_certificate_key /path/to/your/private.key;
    
    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Root directory
    root /var/www/teqanat/build/web;
    index index.html;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/wasm
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        image/svg+xml
        image/x-icon;
    
    # Brotli Compression (enable only if ngx_brotli module is installed)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript application/wasm text/xml application/xml application/xml+rss text/javascript;
    
    # Cache static assets - 1 year
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|wasm|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Cache JSON files - 1 day
    location ~* \.json$ {
        expires 1d;
        add_header Cache-Control "public";
    }
    
    # Don't cache HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Reverse proxy: same-origin /api/* → apis.teqanat.com (fixes browser CORS for POST)
    location /api/ {
        proxy_pass https://apis.teqanat.com/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host apis.teqanat.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Same-origin media — ^~ prevents the static *.jpg regex below from intercepting
    location ^~ /uploads/ {
        proxy_pass https://apis.teqanat.com/uploads/;
        proxy_ssl_server_name on;
        proxy_set_header Host apis.teqanat.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ^~ /ar/uploads/ {
        proxy_pass https://apis.teqanat.com/uploads/;
        proxy_ssl_server_name on;
        proxy_set_header Host apis.teqanat.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ^~ /en/uploads/ {
        proxy_pass https://apis.teqanat.com/uploads/;
        proxy_ssl_server_name on;
        proxy_set_header Host apis.teqanat.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA routing — inject per-page SEO into index.html (static + API-backed).
    # Requires: node server/og-prerender.mjs (see server/og-prerender.mjs)
    location / {
        try_files $uri $uri/ @spa_html;
    }

    location @spa_html {
        proxy_pass http://127.0.0.1:3030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 15s;
        proxy_read_timeout 15s;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Custom error page
    error_page 404 /404.html;
    
    # Optimize buffers
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 8m;
    large_client_header_buffers 4 16k;
}
