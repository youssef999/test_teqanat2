    (function () {
      var l = window.location;

      // 1) spa-github-pages: /repo/?/en/about → /repo/en/about (no navigation)
      if (l.search.length > 1 && l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        // Keep repo root (/test_teqanat2/) even when trailing slash is missing
        var root = l.pathname.endsWith('/') ? l.pathname.slice(0, -1) : l.pathname;
        window.history.replaceState(null, null, root + decoded + l.hash);
        l = window.location;

        var el = document.querySelector('base');
        var href = (el && el.getAttribute('href')) || '/';
        try {
          if (/^https?:/i.test(href)) href = new URL(href).pathname;
        } catch (e) {}
        if (!href || href === '/') return '';
        return href.replace(/\/$/, '');

        var base = appBase();
        var p = decodeURI(pathname || '/');
        if (base && (p === base || p.indexOf(base + '/') === 0)) {

        if (l.pathname + l.search + l.hash === url) return;
        window.history.replaceState(null, null, url);

          return new URLSearchParams();

        return new URLSearchParams(raw);

      var path = stripBase(l.pathname);

        if (p === '/en' || p.indexOf('/en/') === 0) return 'en';
        return 'ar';
      }

      function syncDocumentLocale(lang) {
        lang = lang === 'en' ? 'en' : 'ar';
        var bcp47 = lang === 'en' ? 'en-US' : 'ar-SA';
        var dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = bcp47;

      }

      function stripLocalePrefix(p) {
        if (p === '/ar' || p === '/en') return '/';
        if (p.indexOf('/ar/') === 0) return p.slice(3) || '/';
        if (p.indexOf('/en/') === 0) return p.slice(3) || '/';
        return p;
      }

      function toLocalizedPath(basePath, lang) {
        var route = stripLocalePrefix(basePath);
        if (route === '/') return '/' + lang;
        return '/' + lang + route;

  <!-- Local dev: hide browser network 404 noise in console (request never made for dead endpoints) -->
  <script>
    (function () {
      var host = location.hostname;
      if (host !== 'localhost' && host !== '127.0.0.1') return;

      function isNoisyNetworkLog(args) {
        var text = '';
        for (var i = 0; i < args.length; i++) text += String(args[i]) + ' ';
        return /Failed to load resource/i.test(text) ||
          /404\s*\(Not Found\)/i.test(text) ||
          /127\.0\.0\.1:8088\/api\//i.test(text) ||
          /net::ERR_/i.test(text);
      }

      ['error', 'warn'].forEach(function (level) {
        var original = console[level];
        console[level] = function () {
          if (isNoisyNetworkLog(arguments)) return;
          return original.apply(console, arguments);
        };
      });
    })();
  </script>

        if (localVersion && localVersion !== serverVersion) {

            for (let registration of registrations) {
